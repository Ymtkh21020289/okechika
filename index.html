<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>桶地下を解読するためのツール</title>

<style>

body{
font-family:sans-serif;
margin:0;
}

#documentBar{
position:sticky;
top:0;
background:#ddd;
padding:8px;
z-index:10;
}

#container{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:20px;
padding-bottom:300px;
}

.cell{
width:60px;
height:80px;
border:1px solid black;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
}

.cell.selected{
border:3px solid red;
}

.translate{
font-size:18px;
}

.code{
font-size:10px;
color:gray;
}

.glyph{
display:flex;
gap:2px;
align-items:center;
justify-content:center;
height:30px;
}

.glyph img{
width:24px;
height:24px;
}

#keyboard{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#eee;
padding:10px;
max-height:250px;
overflow:auto;
}

.key{
width:40px;
height:40px;
margin:2px;
cursor:pointer;
}

#dictionaryPanel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

#dictionaryBox{
background:white;
padding:20px;
max-height:80%;
overflow:auto;
}

.dictRow{
display:flex;
align-items:center;
gap:10px;
margin:5px 0;
cursor:pointer;
}

.dictRow:hover{
background:#eee;
}

.dictRow img{
width:24px;
height:24px;
}

#kanaTable td{
border:1px solid #888;
width:28px;
height:28px;
text-align:center;
font-size:14px;
}

.kanaFound{
background:#8cff8c;
}

.kanaUnknown{
background:white;
}

</style>
</head>

<body>

<div id="documentBar">

文章:
<select id="documentSelect" onchange="loadDocument()"></select>

<button onclick="newDocument()">新規</button>
<button onclick="saveDocument()">保存</button>
<button onclick="deleteDocument()">削除</button>
<button onclick="renameDocument()">名前変更</button>

<button onclick="addCell()">マス追加</button>
<button onclick="deleteChar()">⌫文字削除</button>
<button onclick="deleteCell()">マス削除</button>

<input id="reverseInput" type="text" style="width:200px">
<button onclick="reverseConvert()">変換入力</button>
  
<button onclick="showDictionary()">辞書一覧</button>
<button onclick="searchCharacter()">文字検索</button>

<button onclick="toggleKanaPanel()" id="kanaToggleBtn">
50音表を隠す
</button>

</div>

<div id="container"></div>

<div id="keyboard"></div>

<div id="kanaPanel" style="
position:fixed;
right:10px;
top:80px;
background:white;
border:1px solid #aaa;
padding:10px;
z-index:20;
">

<h4>50音対応表</h4>

<table id="kanaTable" style="border-collapse:collapse"></table>

</div>

<div id="dictionaryPanel">

<div id="dictionaryBox">

<h3>辞書</h3>

<div id="dictionaryList"></div>

<button onclick="closeDictionary()">閉じる</button>

</div>

</div>

<div id="searchPanel" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
">

<div style="
background:white;
padding:20px;
max-height:80%;
overflow:auto;
min-width:300px;
">

<h3>文字検索結果</h3>

<div id="searchResults"></div>

<br>

<button onclick="closeSearch()">閉じる</button>

</div>

</div>

<script>

let cells=[]
let currentCell=null
let mapping={}

let documents={}
let currentDocument="文章1"
const kanaGrid=[
["","あ","い","う","え","お"],

["か","か","き","く","け","こ"],
["が","が","ぎ","ぐ","げ","ご"],

["さ","さ","し","す","せ","そ"],
["ざ","ざ","じ","ず","ぜ","ぞ"],

["た","た","ち","つ","て","と"],
["だ","だ","ぢ","づ","で","ど"],

["な","な","に","ぬ","ね","の"],

["は","は","ひ","ふ","へ","ほ"],
["ば","ば","び","ぶ","べ","ぼ"],
["ぱ","ぱ","ぴ","ぷ","ぺ","ぽ"],

["ま","ま","み","む","め","も"],

["や","や","","ゆ","","よ"],

["ら","ら","り","る","れ","ろ"],

["わ","わ","","","","を"],

["","ん","","","",""]
]

function createKeyboard(){

let kb=document.getElementById("keyboard")

kb.innerHTML=""

for(let i=1;i<=20;i++){

let img=document.createElement("img")
img.src="hen/"+i+".jpg"
img.className="key"

img.onclick=()=>selectHen(i)

kb.appendChild(img)

}

kb.appendChild(document.createElement("br"))

for(let i=1;i<=70;i++){

let img=document.createElement("img")
img.src="tsukuri/"+i+".jpg"
img.className="key"

img.onclick=()=>inputTsu(i)

kb.appendChild(img)

}

}

let selectedHen=null

function selectHen(i){
selectedHen=i
}

function inputTsu(i){

if(!currentCell)return

let code

if(selectedHen){
code="H"+selectedHen+"-T"+i
selectedHen=null
}else{
code="T"+i
}

currentCell.code=code

updateCell(currentCell)

saveData()

}

function addCell(){

let c=document.createElement("div")
c.className="cell"

c.onclick=()=>selectCell(c)

let glyph=document.createElement("div")
glyph.className="glyph"

let t=document.createElement("div")
t.className="translate"

c.appendChild(t)
c.appendChild(glyph)

document.getElementById("container").appendChild(c)

cells.push(c)

selectCell(c)

}

function selectCell(c){

cells.forEach(x=>x.classList.remove("selected"))

c.classList.add("selected")

currentCell=c

}

function updateCell(c){

let t=c.querySelector(".translate")
let glyph=c.querySelector(".glyph")

glyph.innerHTML=""

let k=c.code

if(!k){
t.innerText=""
return
}

c.ondblclick=()=>editCurrentCell()

t.innerText=mapping[k]||"?"

/* 偏あり */

if(k.startsWith("H")){

let p=k.split("-")

let h=p[0].substring(1)
let t2=p[1].substring(1)

let hi=document.createElement("img")
hi.src="hen/"+h+".jpg"
hi.style.width="24px"

let ti=document.createElement("img")
ti.src="tsukuri/"+t2+".jpg"
ti.style.width="24px"

glyph.appendChild(hi)
glyph.appendChild(ti)

}

/* 偏なし */

else if(k.startsWith("T")){

let t2=k.substring(1)

let ti=document.createElement("img")
ti.src="tsukuri/"+t2+".jpg"
ti.style.width="24px"

glyph.appendChild(ti)

}

}

function updateAll(){
cells.forEach(updateCell)
}

function deleteChar(){

if(!currentCell)return

currentCell.code=null

updateCell(currentCell)

saveData()

}

function deleteCell(){

if(!currentCell)return

let index=cells.indexOf(currentCell)

currentCell.remove()

cells.splice(index,1)

if(cells.length>0){

let n=Math.min(index,cells.length-1)

selectCell(cells[n])

}else{

currentCell=null

}

saveData()

}

function changeMapping(){

if(!currentCell)return

let k=currentCell.code

if(!k)return

let v=prompt("対応文字",mapping[k]||"")

if(v===null)return

mapping[k]=v

updateAll()

saveData()

}

function showDictionary(){

let list=document.getElementById("dictionaryList")

list.innerHTML=""

Object.keys(mapping).forEach(code=>{

let row=document.createElement("div")
row.className="dictRow"

if(code.startsWith("H")){

let p=code.split("-")

let h=p[0].substring(1)
let t=p[1].substring(1)

let hi=document.createElement("img")
hi.src="hen/"+h+".jpg"

let ti=document.createElement("img")
ti.src="tsukuri/"+t+".jpg"

row.appendChild(hi)
row.appendChild(ti)

}else{

let t=code.substring(1)

let ti=document.createElement("img")
ti.src="tsukuri/"+t+".jpg"

row.appendChild(ti)

}

let text=document.createElement("span")
text.innerText=" → "+mapping[code]

row.appendChild(text)

row.onclick=()=>editDictionary(code)

list.appendChild(row)

})

document.getElementById("dictionaryPanel").style.display="flex"

}

function closeDictionary(){
document.getElementById("dictionaryPanel").style.display="none"
}

function editDictionary(code){

let v=prompt("編集",mapping[code])

if(v===null)return

if(v===""){
delete mapping[code]
}else{
mapping[code]=v
}

updateAll()
updateKanaTable()

saveData()

showDictionary()

}

function clearCells(){

document.getElementById("container").innerHTML=""

cells=[]

currentCell=null

}

function exportCells(){
return cells.map(c=>c.code||null)
}

function importCells(data){

clearCells()

data.forEach(code=>{

addCell()

cells[cells.length-1].code=code

})

updateAll()

}

function saveDocument(showMessage=true){

documents[currentDocument]={
cells:exportCells()
}

localStorage.setItem("oketsu_documents",JSON.stringify(documents))

if(showMessage){
alert("保存しました")
}

}

function loadDocument(){

let select=document.getElementById("documentSelect")

currentDocument=select.value

let d=documents[currentDocument]

if(!d)return

importCells(d.cells||[])

}

function newDocument(){

let name=prompt("文章名")

if(!name)return

documents[name]={}

currentDocument=name

updateDocumentList()

clearCells()

}

function deleteDocument(){

if(!confirm("削除?"))return

delete documents[currentDocument]

localStorage.setItem("oketsu_documents",JSON.stringify(documents))

currentDocument=Object.keys(documents)[0]

updateDocumentList()

loadDocument()

}

function updateDocumentList(){

let select=document.getElementById("documentSelect")

select.innerHTML=""

Object.keys(documents).forEach(n=>{

let o=document.createElement("option")

o.value=n
o.textContent=n

if(n===currentDocument)o.selected=true

select.appendChild(o)

})

}

function loadDocuments(){

let d=localStorage.getItem("oketsu_documents")

if(d)documents=JSON.parse(d)

if(!documents[currentDocument])documents[currentDocument]={}

updateDocumentList()

let dic=localStorage.getItem("oketsu_dictionary")

if(dic){
mapping=JSON.parse(dic)
}

}

function saveData(){

saveDocument(false)
saveDictionary()

}
  
document.addEventListener("keydown",e=>{

if(e.key==="ArrowRight"){

let i=cells.indexOf(currentCell)

if(i<cells.length-1)selectCell(cells[i+1])

}

if(e.key==="ArrowLeft"){

let i=cells.indexOf(currentCell)

if(i>0)selectCell(cells[i-1])

}

if(e.key==="Backspace"){
deleteChar()
e.preventDefault()
}

if(e.key==="Delete"){
deleteCell()
}

})

createKeyboard()

loadDictionary()
loadDocuments()
addCell()

createKanaTable()
updateKanaTable()

function editCurrentCell(){

if(!currentCell)return

let k=currentCell.code

if(!k){
alert("先に桶地下文字を入力してください")
return
}

let current=mapping[k]||""

let v=prompt("対応文字を入力",current)

if(v===null)return

if(v===""){
delete mapping[k]
}else{
mapping[k]=v
}

updateAll()
updateKanaTable()
saveData()

}

function loadDictionary(){

let dic=localStorage.getItem("oketsu_dictionary")

if(dic){
mapping=JSON.parse(dic)
}

}

function saveDictionary(){

localStorage.setItem(
"oketsu_dictionary",
JSON.stringify(mapping)
)

}

function buildReverseDictionary(){

let reverse={}

Object.keys(mapping).forEach(code=>{

let v=mapping[code]

if(!v) return

reverse[v]=code

})

return reverse

}

function reverseConvert(){

let text=document.getElementById("reverseInput").value

if(!text) return

let reverse=buildReverseDictionary()

let startIndex=cells.indexOf(currentCell)

if(startIndex==-1) startIndex=cells.length

for(let i=0;i<text.length;i++){

let ch=text[i]

let code=reverse[ch]

if(!code){
addCell()
continue
}

let index=startIndex+i

if(index>=cells.length){
addCell()
}

cells[index].code=code

updateCell(cells[index])

}

saveData()

}

function searchCharacter(){

if(!currentCell){
alert("セルを選択してください")
return
}

let code=currentCell.code

if(!code){
alert("文字がありません")
return
}

/* 現在の位置 */
let currentIndex=cells.indexOf(currentCell)

let results=[]

Object.keys(documents).forEach(docName=>{

let doc=documents[docName]

if(!doc.cells) return

doc.cells.forEach((c,i)=>{

/* 一致チェック */
if(c===code){

/* 自分自身は除外 */
if(docName===currentDocument && i===currentIndex){
return
}

results.push({
doc:docName,
pos:i+1
})

}

})

})

showSearchResults(code,results)

}
  
function showSearchResults(code,results){

let panel=document.getElementById("searchPanel")
let list=document.getElementById("searchResults")

list.innerHTML=""

if(results.length===0){

list.innerText="使用されている文章はありません"

}else{

results.forEach(r=>{

let div=document.createElement("div")

div.innerText=r.doc+" ： "+r.pos+"文字目"

div.style.cursor="pointer"

div.onclick=()=>{
jumpToResult(r.doc,r.pos-1)
}

list.appendChild(div)

})

}

panel.style.display="flex"

}

function closeSearch(){
document.getElementById("searchPanel").style.display="none"
}

function jumpToResult(docName,index){

/* パネル閉じる */
closeSearch()

/* 文章切り替え */
currentDocument=docName

document.getElementById("documentSelect").value=docName

loadDocument()

/* セル選択 */
setTimeout(()=>{

if(cells[index]){
selectCell(cells[index])

/* スクロール */
cells[index].scrollIntoView({
behavior:"smooth",
block:"center"
})

}

},50)

}

function renameDocument(){

let oldName=currentDocument

let newName=prompt("新しい文章名を入力",oldName)

if(!newName) return

/* 同名チェック */

if(documents[newName]){
alert("同じ名前の文章があります")
return
}

/* データ移動 */

documents[newName]=documents[oldName]

delete documents[oldName]

currentDocument=newName

/* 保存 */

localStorage.setItem(
"oketsu_documents",
JSON.stringify(documents)
)

/* UI更新 */

updateDocumentList()

document.getElementById("documentSelect").value=newName

}

function createKanaTable(){

let table=document.getElementById("kanaTable")

kanaGrid.forEach(row=>{

let tr=document.createElement("tr")

row.forEach(k=>{

let td=document.createElement("td")

td.innerText=k

if(k==="") td.style.background="#eee"

tr.appendChild(td)

})

table.appendChild(tr)

})

}

function updateKanaTable(){

let found=new Set()

Object.values(mapping).forEach(v=>{

if(!v) return

/* ひらがなのみ対象 */

if(v.match(/[ぁ-ん]/)){
found.add(v)
}

})

let table=document.getElementById("kanaTable")

Array.from(table.querySelectorAll("td")).forEach(td=>{

let k=td.innerText

if(!k) return

if(found.has(k)){
td.className="kanaFound"
}else{
td.className="kanaUnknown"
}

})

}

function toggleKanaPanel(){

let panel=document.getElementById("kanaPanel")
let btn=document.getElementById("kanaToggleBtn")

if(panel.style.display==="none"){

panel.style.display="block"
btn.innerText="50音表を隠す"

}else{

panel.style.display="none"
btn.innerText="50音表を表示"

}

}

</script>

</body>
</html>
