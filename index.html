<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>桶地下 解読ツール</title>

<style>

body{
margin:0;
font-family:sans-serif;
display:flex;
flex-direction:column;
height:100vh;
}

#gridArea{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-wrap:wrap;
gap:10px;
align-content:flex-start;
}

.cell{
width:80px;
height:80px;
border:2px solid #333;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
cursor:pointer;
}

/* 選択中マス */

.cell.selected{
border:3px solid red;
}

.translation{
font-size:14px;
position:absolute;
top:2px;
}

.symbol{
display:flex;
align-items:center;
gap:4px;
}

.symbol img{
width:28px;
height:28px;
}

/* キーボード */

#keyboard{
border-top:2px solid #333;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
max-height:260px;
overflow-y:auto;
}

.keyboardRow{
display:flex;
flex-wrap:wrap;
gap:6px;
}

.key{
border:1px solid #444;
padding:6px;
cursor:pointer;
background:#eee;
display:flex;
align-items:center;
justify-content:center;
}

.key:hover{
background:#ddd;
}

.key img{
width:28px;
height:28px;
}

.selectedHen{
background:#ffd966;
}

</style>
</head>

<body>

<div id="gridArea"></div>

<div style="padding:10px;border-top:1px solid #aaa">
<button onclick="addCell()">マス追加</button>
<button onclick="changeMapping()">対応文字変更</button>
</div>

<div id="keyboard">

<div>
<b>偏</b>
<div id="henKeys" class="keyboardRow"></div>
</div>

<div>
<b>旁</b>
<div id="tsukuriKeys" class="keyboardRow"></div>
</div>

</div>

<script>

let mapping={}
let cells=[]
let currentCell=null
let selectedHen=null

/* マス追加 */

function addCell(){

let grid=document.getElementById("gridArea")

let cell=document.createElement("div")
cell.className="cell"

let trans=document.createElement("div")
trans.className="translation"

let sym=document.createElement("div")
sym.className="symbol"

cell.appendChild(trans)
cell.appendChild(sym)

cell.onclick=()=>{

document.querySelectorAll(".cell")
.forEach(c=>c.classList.remove("selected"))

cell.classList.add("selected")

currentCell=cell

}

grid.appendChild(cell)
cells.push(cell)

}

/* 偏キーボード */

function createHenKeys(){

let area=document.getElementById("henKeys")

for(let i=1;i<=20;i++){

let key=document.createElement("div")
key.className="key"

let img=document.createElement("img")
img.src="hen/"+i+".jpg"

key.appendChild(img)

key.onclick=()=>{

selectedHen=i

document.querySelectorAll("#henKeys .key")
.forEach(k=>k.classList.remove("selectedHen"))

key.classList.add("selectedHen")

createTsukuriKeys()

}

area.appendChild(key)

}

}

/* 旁キーボード */

function createTsukuriKeys(){

let area=document.getElementById("tsukuriKeys")
area.innerHTML=""

for(let i=1;i<=70;i++){

let key=document.createElement("div")
key.className="key"

let img=document.createElement("img")
img.src="tsukuri/"+i+".jpg"

key.appendChild(img)

let code="H"+selectedHen+"-T"+i

key.onclick=()=>{
inputOkechika(code,selectedHen,i)
}

area.appendChild(key)

}

}

/* 入力 */

function inputOkechika(code,hen,tsukuri){

if(!currentCell)return

let sym=currentCell.querySelector(".symbol")
let trans=currentCell.querySelector(".translation")

sym.innerHTML=""

let henImg=document.createElement("img")
henImg.src="hen/"+hen+".jpg"

let tsuImg=document.createElement("img")
tsuImg.src="tsukuri/"+tsukuri+".jpg"

sym.appendChild(henImg)
sym.appendChild(tsuImg)

currentCell.dataset.code=code

if(mapping[code]){
trans.innerText=mapping[code]
}else{
trans.innerText="?"
}

}

/* 対応文字変更 */

function changeMapping(){

if(!currentCell){
alert("文字マスを選択してください")
return
}

let code=currentCell.dataset.code

if(!code){
alert("先に桶地下文字を入力してください")
return
}

let text=prompt("対応文字を入力")

if(text==null)return

mapping[code]=text

updateAll()

}

/* 更新 */

function updateAll(){

cells.forEach(cell=>{

let code=cell.dataset.code
let trans=cell.querySelector(".translation")

if(mapping[code]){
trans.innerText=mapping[code]
}

})

}

/* 初期化 */

createHenKeys()
addCell()

</script>

</body>
</html>
