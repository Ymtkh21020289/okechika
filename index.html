<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>桶地下 解読ツール</title>

<style>

body{
margin:0;
font-family:sans-serif;
display:flex;
flex-direction:column;
height:100vh;
}

#documentBar{
position:sticky;
top:0;
left:0;
width:100%;
background:#ddd;
padding:8px;
z-index:10;
}

#container{
margin-top:60px;
}

#gridArea{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-wrap:wrap;
gap:10px;
align-content:flex-start;
}

.cell{
width:80px;
height:80px;
border:2px solid #333;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
cursor:pointer;
}

.cell.selected{
border:3px solid red;
}

.translation{
font-size:14px;
position:absolute;
top:2px;
}

.symbol{
display:flex;
align-items:center;
gap:4px;
}

.symbol img{
width:28px;
height:28px;
}

/* キーボード */

#keyboard{
border-top:2px solid #333;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
max-height:260px;
overflow-y:auto;
}

.keyboardRow{
display:flex;
flex-wrap:wrap;
gap:6px;
}

.key{
border:1px solid #444;
padding:6px;
cursor:pointer;
background:#eee;
display:flex;
align-items:center;
justify-content:center;
}

.key:hover{
background:#ddd;
}

.key img{
width:28px;
height:28px;
}

.selectedHen{
background:#ffd966;
}

#dictionaryPanel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

#dictionaryBox{
background:white;
padding:20px;
max-height:80%;
overflow:auto;
min-width:300px;
}

.dictRow{
display:flex;
align-items:center;
gap:10px;
margin:5px 0;
cursor:pointer;
}

.dictRow:hover{
background:#eeeeee;
}

.dictRow img{
width:24px;
height:24px;
}

</style>
</head>

<body>

<div id="documentBar">

文章:
<select id="documentSelect" onchange="loadDocument()"></select>

<button onclick="newDocument()">新規</button>
<button onclick="saveDocument()">保存</button>
<button onclick="deleteDocument()">削除</button>

</div>

<div id="gridArea"></div>

<div style="padding:10px;border-top:1px solid #aaa">
<button onclick="addCell()">マス追加</button>
<button onclick="deleteCell()">マス削除</button>
<button onclick="changeMapping()">対応文字変更</button>
<button onclick="resetData()">リセット</button>
<button onclick="deleteChar()">⌫ 削除</button>
<button onclick="showDictionary()">辞書一覧</button>
</div>

<div id="keyboard">

<div>
<b>偏</b>
<div id="henKeys" class="keyboardRow"></div>
</div>

<div>
<b>旁</b>
<div id="tsukuriKeys" class="keyboardRow"></div>
</div>

</div>

<div id="dictionaryPanel">

<div id="dictionaryBox">

<h3>登録済み辞書</h3>

<div id="dictionaryList"></div>

<br>

<button onclick="closeDictionary()">閉じる</button>

</div>

</div>

<script>

let mapping={}
let cells=[]
let currentCell=null
let selectedHen=null
let documents={}
let currentDocument="default"

/* 保存 */

function saveData(){

let codes=cells.map(c=>c.dataset.code || null)

localStorage.setItem("oketika_codes",JSON.stringify(codes))
localStorage.setItem("oketika_mapping",JSON.stringify(mapping))

}

/* 読み込み */

function loadData(){

let savedCodes=JSON.parse(localStorage.getItem("oketika_codes")||"[]")
mapping=JSON.parse(localStorage.getItem("oketika_mapping")||"{}")

savedCodes.forEach(code=>{

addCell()

if(code){

let parts=code.split("-")
let hen=parseInt(parts[0].substring(1))
let tsu=parseInt(parts[1].substring(1))

inputOkechika(code,hen,tsu)

}

})

}

/* マス追加 */

function addCell(){

let grid=document.getElementById("gridArea")

let cell=document.createElement("div")
cell.className="cell"

let trans=document.createElement("div")
trans.className="translation"

let sym=document.createElement("div")
sym.className="symbol"

cell.appendChild(trans)
cell.appendChild(sym)

cell.onclick=()=>{
selectCell(cell)
}

grid.appendChild(cell)
cells.push(cell)

saveData()

}

/* 文字削除 */

function deleteChar(){

if(!currentCell)return

let sym=currentCell.querySelector(".symbol")
let trans=currentCell.querySelector(".translation")

sym.innerHTML=""
trans.innerText=""

delete currentCell.dataset.code

saveData()

}

/* 偏キーボード */

function createHenKeys(){

let area=document.getElementById("henKeys")

/* 偏なし */

let noneKey=document.createElement("div")
noneKey.className="key"
noneKey.innerText="偏なし"

noneKey.onclick=()=>{

selectedHen=0

document.querySelectorAll("#henKeys .key")
.forEach(k=>k.classList.remove("selectedHen"))

noneKey.classList.add("selectedHen")

createTsukuriKeys()

}

area.appendChild(noneKey)

/* 偏1〜20 */

for(let i=1;i<=20;i++){

let key=document.createElement("div")
key.className="key"

let img=document.createElement("img")
img.src="hen/"+i+".jpg"

key.appendChild(img)

key.onclick=()=>{

selectedHen=i

document.querySelectorAll("#henKeys .key")
.forEach(k=>k.classList.remove("selectedHen"))

key.classList.add("selectedHen")

createTsukuriKeys()

}

area.appendChild(key)

}

}

/* 旁キーボード */

function createTsukuriKeys(){

let area=document.getElementById("tsukuriKeys")
area.innerHTML=""

for(let i=1;i<=70;i++){

let key=document.createElement("div")
key.className="key"

let img=document.createElement("img")
img.src="tsukuri/"+i+".jpg"

key.appendChild(img)

/* コード */

let code

if(selectedHen===0){
code="T"+i
}else{
code="H"+selectedHen+"-T"+i
}

key.onclick=()=>{
inputOkechika(code,selectedHen,i)
}

area.appendChild(key)

}

}

/* 入力 */

function inputOkechika(code,hen,tsukuri){

if(!currentCell)return

let sym=currentCell.querySelector(".symbol")
let trans=currentCell.querySelector(".translation")

sym.innerHTML=""

/* 偏あり */

if(hen>0){

let henImg=document.createElement("img")
henImg.src="hen/"+hen+".jpg"
sym.appendChild(henImg)

}

/* 旁 */

let tsuImg=document.createElement("img")
tsuImg.src="tsukuri/"+tsukuri+".jpg"
sym.appendChild(tsuImg)

currentCell.dataset.code=code

if(mapping[code]){
trans.innerText=mapping[code]
}else{
trans.innerText="?"
}

saveData()

}
/* 対応文字変更 */

function changeMapping(){

if(!currentCell){
alert("文字マスを選択してください")
return
}

let code=currentCell.dataset.code

if(!code){
alert("先に桶地下文字を入力してください")
return
}

let text=prompt("対応文字を入力")

if(text==null)return

mapping[code]=text

updateAll()
saveData()

}

/* 更新 */

function updateAll(){

cells.forEach(cell=>{

let code=cell.dataset.code
let trans=cell.querySelector(".translation")

if(mapping[code]){
trans.innerText=mapping[code]
}

})

}

/* リセット */

function resetData(){

if(!confirm("全データ削除しますか？")) return

localStorage.clear()
location.reload()

}

/* 初期化 */

createHenKeys()
loadData()
loadDocuments()
loadDocument()

if(cells.length===0){
addCell()
}

document.addEventListener("keydown",function(e){

if(e.key==="Backspace"){

if(currentCell){
deleteChar()
e.preventDefault()
}

}

})

document.addEventListener("keydown",function(e){

if(!currentCell) return

let index=cells.indexOf(currentCell)

/* 右移動 */

if(e.key==="ArrowRight"){

if(index < cells.length-1){

selectCell(cells[index+1])

}

}

/* 左移動 */

if(e.key==="ArrowLeft"){

if(index > 0){

selectCell(cells[index-1])

}

}

if(e.key==="Delete"){

deleteCell()
e.preventDefault()

}

})

/* セル選択関数 */

function selectCell(cell){

document.querySelectorAll(".cell")
.forEach(c=>c.classList.remove("selected"))

cell.classList.add("selected")
currentCell=cell

}

function showDictionary(){

let panel=document.getElementById("dictionaryPanel")
let list=document.getElementById("dictionaryList")

list.innerHTML=""

let keys=Object.keys(mapping)

if(keys.length===0){
list.innerHTML="辞書はまだ登録されていません"
}else{

keys.sort()

keys.forEach(code=>{

let row=document.createElement("div")
row.className="dictRow"
row.onclick=()=>{
editDictionary(code)
}

/* 偏あり */

if(code.startsWith("H")){

let parts=code.split("-")

let hen=parts[0].substring(1)
let tsu=parts[1].substring(1)

let henImg=document.createElement("img")
henImg.src="hen/"+hen+".jpg"

let tsuImg=document.createElement("img")
tsuImg.src="tsukuri/"+tsu+".jpg"

row.appendChild(henImg)
row.appendChild(tsuImg)

}

/* 偏なし */

if(code.startsWith("T")){

let tsu=code.substring(1)

let tsuImg=document.createElement("img")
tsuImg.src="tsukuri/"+tsu+".jpg"

row.appendChild(tsuImg)

}

/* 翻訳 */

let text=document.createElement("span")
text.innerText=" → "+mapping[code]

row.appendChild(text)

list.appendChild(row)

})

}

panel.style.display="flex"

}

function closeDictionary(){

document.getElementById("dictionaryPanel").style.display="none"

}

function editDictionary(code){

let current=mapping[code]

let text=prompt("対応文字を編集",current)

if(text===null) return

if(text===""){
delete mapping[code]
}else{
mapping[code]=text
}

updateAll()
saveData()
showDictionary()

}

function deleteCell(){

if(!currentCell) return

let index=cells.indexOf(currentCell)

currentCell.remove()

cells.splice(index,1)

/* 次のセル選択 */

if(cells.length>0){

let newIndex=Math.min(index,cells.length-1)
selectCell(cells[newIndex])

}else{

currentCell=null

}

saveData()

}

function loadDocuments(){

let data=localStorage.getItem("oketsu_documents")

if(data){
documents=JSON.parse(data)
}

updateDocumentList()

if(!documents[currentDocument]){
documents[currentDocument]={}
}

}

function updateDocumentList(){

let select=document.getElementById("documentSelect")

select.innerHTML=""

Object.keys(documents).forEach(name=>{

let opt=document.createElement("option")
opt.value=name
opt.textContent=name

if(name===currentDocument){
opt.selected=true
}

select.appendChild(opt)

})

}

function newDocument(){

let name=prompt("文章名を入力")

if(!name) return

documents[name]={}

currentDocument=name

updateDocumentList()

clearCells()

}

function saveDocument(){

documents[currentDocument]={
cells:exportCells(),
mapping:{...mapping}
}

localStorage.setItem(
"oketsu_documents",
JSON.stringify(documents)
)

alert("保存しました")

}

function loadDocument(){

let select=document.getElementById("documentSelect")

currentDocument=select.value

let data=documents[currentDocument]

if(!data) return

importCells(data.cells)

mapping=data.mapping||{}

updateAll()

}

function deleteDocument(){

if(!confirm("削除しますか？")) return

delete documents[currentDocument]

localStorage.setItem(
"oketsu_documents",
JSON.stringify(documents)
)

currentDocument=Object.keys(documents)[0]||"default"

updateDocumentList()
loadDocument()

}

function exportCells(){

return cells.map(c=>{

return c.code ? c.code : null

})

}

function importCells(data){

clearCells()

data.forEach(code=>{

addCell()

let cell=cells[cells.length-1]

cell.code=code

})

updateAll()

}

function clearCells(){

/* 盤面要素取得 */
const container=document.getElementById("container")

/* DOM削除 */
container.innerHTML=""

/* 配列初期化 */
cells=[]

/* 選択セル解除 */
currentCell=null

}
  
</script>

</body>
</html>
